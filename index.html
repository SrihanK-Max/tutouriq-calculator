<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tutouriq Calculator</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #e3f2fd, #ffffff);
    text-align: center;
    margin: 0;
}

.container {
    background: white;
    padding: 25px;
    max-width: 360px;
    margin: 40px auto;
    border-radius: 15px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.1);
    border-top: 6px solid #4FC3F7;
}

h2 {
    color: #0B1F3B;
    margin-bottom: 15px;
}

.subject {
    text-align: left;
    margin: 12px 0;
    padding: 8px;
    border-radius: 8px;
    transition: 0.2s;
}

.subject:hover {
    background: #e3f2fd;
}

input[type="checkbox"] {
    margin-right: 8px;
    accent-color: #4FC3F7;
}

input[type="number"] {
    padding: 6px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    margin-top: 18px;
    padding: 12px 20px;
    background: linear-gradient(45deg, #0B1F3B, #4FC3F7);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

.result {
    margin-top: 18px;
    font-size: 22px;
    font-weight: bold;
    color: #0B1F3B;
}

.discount {
    color: #2e7d32;
    font-size: 14px;
    margin-top: 5px;
}
</style>

</head>

<body>

<div class="container">
    <h2>Tutouriq Calculator</h2>

    <div class="subject">
        <input type="checkbox" value="20"> Math ($20/week)
    </div>

    <div class="subject">
        <input type="checkbox" value="15"> Science ($15/week)
    </div>

    <div class="subject">
        <input type="checkbox" value="15"> Humanities ($15/week)
    </div>

    <div class="subject">
        <input type="checkbox" value="15"> Study Tips ($15/week)
    </div>

    <p>Number of Weeks:</p>
    <input type="number" id="weeks" value="1" min="1">

    <br>

    <button onclick="calculate()">Calculate</button>

    <div class="result" id="result">$0</div>
    <div class="discount" id="discount"></div>
</div>

<script>
function calculate() {
    let selected = document.querySelectorAll('input[type="checkbox"]:checked');
    let weeks = parseFloat(document.getElementById("weeks").value);

    let totalPerWeek = 0;

    selected.forEach(item => {
        totalPerWeek += Number(item.value);
    });

    let originalTotal = totalPerWeek * weeks;
    let finalTotal = originalTotal;
    let savings = 0;

    if (selected.length >= 2) {
        finalTotal = originalTotal * 0.9;
        savings = originalTotal - finalTotal;
        document.getElementById("discount").innerText = "10% discount applied!";
    } else {
        document.getElementById("discount").innerText = "";
    }

    document.getElementById("result").innerHTML =
        "$" + finalTotal.toFixed(2) + " total<br>" +
        "<span style='font-size:14px; color:gray;'>($" + totalPerWeek + "/week × " + weeks + " weeks)</span>";

    if (savings > 0) {
        document.getElementById("discount").innerHTML += 
            "<br>You saved $" + savings.toFixed(2) + " 🎉";
    }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Tutouriq Calculator</title>

  <!-- Responsive for mobile + Canva -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #e3f2fd, #ffffff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 25px;
      width: 340px;
      border-radius: 15px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.1);
      border-top: 6px solid #4FC3F7;
      text-align: center;
    }

    h2 {
      color: #0B1F3B;
      margin-bottom: 15px;
    }

    .subject {
      text-align: left;
      margin: 10px 0;
      padding: 8px;
      border-radius: 8px;
      transition: 0.2s;
    }

    .subject:hover {
      background: #e3f2fd;
    }

    input[type="checkbox"] {
      accent-color: #4FC3F7;
    }

    input[type="number"] {
      padding: 6px;
      border-radius: 6px;
      border: 1px solid #ccc;
      width: 80px;
    }

    button {
      margin-top: 15px;
      padding: 12px;
      width: 100%;
      background: linear-gradient(45deg, #0B1F3B, #4FC3F7);
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.03);
    }

    .result {
      margin-top: 15px;
      font-size: 20px;
      font-weight: bold;
      color: #0B1F3B;
    }

    .discount {
      color: #2e7d32;
      margin-top: 5px;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Tutouriq Calculator</h2>

    <div class="subject">
      <label><input type="checkbox" value="20"> Math ($20/week)</label>
    </div>

    <div class="subject">
      <label><input type="checkbox" value="15"> Science ($15/week)</label>
    </div>

    <div class="subject">
      <label><input type="checkbox" value="15"> Humanities ($15/week)</label>
    </div>

    <div class="subject">
      <label><input type="checkbox" value="15"> Study Tips ($15/week)</label>
    </div>

    <p>Number of Weeks:</p>
    <input type="number" id="weeks" value="1" min="1">

    <button onclick="calculate()">Calculate</button>

    <div class="result" id="result">$0</div>
    <div class="discount" id="discount"></div>
  </div>

  <script>
    function calculate() {
      let selected = document.querySelectorAll('input[type="checkbox"]:checked');
      let weeks = parseFloat(document.getElementById("weeks").value);

      let totalPerWeek = 0;

      selected.forEach(item => {
        totalPerWeek += Number(item.value);
      });

      let original = totalPerWeek * weeks;
      let final = original;
      let savings = 0;

      if (selected.length >= 2) {
        final = original * 0.9;
        savings = original - final;
        document.getElementById("discount").innerText =
          "10% discount applied! You saved $" + savings.toFixed(2);
      } else {
        document.getElementById("discount").innerText = "";
      }

      document.getElementById("result").innerHTML =
        "$" + final.toFixed(2) + " total<br>" +
        "<span style='font-size:13px;color:gray;'>($" + totalPerWeek + "/week × " + weeks + " weeks)</span>";
    }
  </script>

</body>
</html>
